<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I AM UNIVERSE</title>
    <!-- 核心修改：GitHub风格圆形黑白W图标（Base64嵌入，无外部依赖） -->
    <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzIiIGhlaWdodD0iMzIiIHZpZXdCb3g9IjAgMCAzMiAzMiIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48Y2lyY2xlIGN4PSIxNiIgY3k9IjE2IiByPSIxNiIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjMDAwIiBzdHJva2Utd2lkdGg9IjMiLz48dGV4dCB4PSIxNiIgeT0iMjEiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIyMCIgZmlsbD0iI0ZGRiIgdGV4dC1hbmNob3I9Im1pZGRsZSIgYWxpZ25tZW50LWJhc2VsaW5lPSJtaWRkbGUiPk08L3RleHQ+PC9zdmc+">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #fff;
            color: #000;
            overflow-x: hidden;
            line-height: 1.5;
        }

        .floating-text {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.08;
            font-family: monospace;
            font-size: 12px;
        }

        .floating-line {
            position: absolute;
            white-space: nowrap;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh); opacity: 0; }
            5% { opacity: 1; }
            95% { opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(#eee 1px, transparent 1px),
                linear-gradient(90deg, #eee 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -2;
            opacity: 0.5;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 40px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 18px;
        }

        .w-icon {
            font-size: 24px;
            font-weight: 900;
            color: #ff6700;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 32px;
            font-size: 14px;
        }

        .nav-right a {
            color: #000;
            text-decoration: none;
            opacity: 0.7;
            transition: opacity 0.2s ease;
        }

        .nav-right a:hover {
            opacity: 1;
        }

        .social-icons {
            display: flex;
            gap: 16px;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .brand-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .brand-icon {
            font-size: 48px;
            font-weight: 900;
            color: #ff6700;
        }

        .brand-name {
            font-size: 48px;
            font-weight: 600;
            color: #ff6700;
        }

        .typewriter-line1 {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 16px;
            color: #000;
            white-space: nowrap;
        }

        .typewriter-line2 {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 32px;
            color: #ff6700;
            overflow: hidden;
            border-right: 4px solid #ff6700;
            animation: blink-caret 0.75s step-end infinite;
            white-space: nowrap;
            min-height: 1.2em;
            min-width: 20px;
        }

        .typewriter-line2.chinese-spacing {
            letter-spacing: 0.5em;
        }

        .typewriter-line2.english-spacing {
            letter-spacing: normal;
        }

        @keyframes blink-caret {
            from, to { border-color: transparent; }
            50% { border-color: #ff6700; }
        }

        .subtitle {
            font-size: clamp(1rem, 3vw, 1.25rem);
            opacity: 0.7;
            margin-bottom: 16px;
            max-width: 600px;
        }

        .slogan {
            font-size: clamp(1rem, 3vw, 1.25rem);
            color: #ff6700;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 48px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            display: inline-block;
            margin: 0 8px;
        }

        .btn-primary {
            background-color: #000;
            color: #fff;
        }

        .btn-primary:hover {
            background-color: #333;
        }

        .btn-secondary {
            background-color: #eee;
            color: #000;
            opacity: 0.8;
        }

        .btn-secondary:hover {
            opacity: 1;
            background-color: #e0e0e0;
        }

        @media (max-width: 768px) {
            nav {
                padding: 16px 20px;
            }
            .nav-right {
                gap: 16px;
            }
            .social-icons {
                display: none;
            }
            .typewriter-line2.chinese-spacing {
                letter-spacing: 0.3em;
            }
            .btn-group {
                flex-direction: column;
                gap: 16px;
            }
            .btn {
                margin: 0;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="grid-bg"></div>
    <div class="floating-text" id="floatingText"></div>

    <nav>
        <div class="nav-left">
            <span class="w-icon">W</span>
            <span>UNIVERSE</span>
        </div>
        <div class="nav-right">
            <a href="#features">Features</a>
            <a href="#pre-order">Pre-order</a>
            <a href="#faq">FAQ</a>
            <div class="social-icons">
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-tiktok"></i></a>
                <a href="#"><i class="fab fa-weixin"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="brand-wrapper">
            <span class="brand-icon">W</span>
            <span class="brand-name">UNIVERSE</span>
        </div>
        <div class="typewriter-line1">Welcome, I am</div>
        <div class="typewriter-line2" id="typewriter"></div>
        <p class="subtitle">
            UNIVERSE means the cosmos, the entire space and everything in it.
        </p>
        <p class="slogan">NOBODY DOES THIS LIKE ME</p>
        <div class="btn-group">
            <a href="https://github.com" target="_blank" class="btn btn-primary">View My Projects</a>
            <a href="mailto:your@email.com" class="btn btn-secondary">Contact Me</a>
        </div>
    </section>

    <script>
        const aiCodes = [
            "import torch","import tensorflow as tf","from transformers import AutoModel",
            "model = AutoModel.from_pretrained('llama-3')","response = model.generate(prompt)"
        ];

        const floatingText = document.getElementById('floatingText');
        const lineCount = 20;

        for (let i = 0; i < lineCount; i++) {
            const line = document.createElement('div');
            line.className = 'floating-line';
            line.textContent = aiCodes[Math.floor(Math.random() * aiCodes.length)];
            const x = Math.random() * window.innerWidth;
            const duration = 20 + Math.random() * 30;
            const delay = Math.random() * 20;
            line.style.left = `${x}px`;
            line.style.animationDuration = `${duration}s`;
            line.style.animationDelay = `${delay}s`;
            floatingText.appendChild(line);
        }

        const typewriter = document.getElementById('typewriter');
        const textSequence = ["王宇宙","UNIVERSE WANG"];
        let sequenceIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function typeWriterEffect() {
            const currentText = textSequence[sequenceIndex];
            if (currentText === "王宇宙") {
                typewriter.classList.add('chinese-spacing');
                typewriter.classList.remove('english-spacing');
            } else {
                typewriter.classList.add('english-spacing');
                typewriter.classList.remove('chinese-spacing');
            }

            if (!isDeleting && charIndex < currentText.length) {
                typewriter.textContent += currentText.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriterEffect, 150);
            } else if (isDeleting && charIndex > 0) {
                typewriter.textContent = currentText.substring(0, charIndex - 1);
                charIndex--;
                setTimeout(typeWriterEffect, 80);
            } else {
                isDeleting = !isDeleting;
                if (!isDeleting) {
                    sequenceIndex = (sequenceIndex + 1) % textSequence.length;
                    setTimeout(typeWriterEffect, 1000);
                } else {
                    setTimeout(typeWriterEffect, 1500);
                }
            }
        }

        setTimeout(typeWriterEffect, 1000);
    </script>
</body>
</html>
